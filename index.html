<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deutsch Flashcards</title>
    <style>
        /* --- CSS: The Design --- */
        :root {
            --primary: #4255ff; /* Quizlet Blue */
            --accent: #3ccfcf;
            --bg: #f6f7fb;
            --white: #ffffff;
            --text: #1a1d28;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .app-container {
            width: 90%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 40px;
            color: var(--primary);
        }

        /* Flashcard 3D Flip Effect */
        .flashcard-wrapper {
            perspective: 1000px;
            width: 100%;
            height: 350px;
            margin-bottom: 30px;
            cursor: pointer;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            padding: 30px;
            box-sizing: border-box;
            background: var(--white);
        }

        .card-back {
            background: var(--primary);
            color: var(--white);
            transform: rotateY(180deg);
        }

        .word {
            font-size: 2.8rem;
            font-weight: bold;
            margin: 0;
        }

        .hint {
            margin-top: 15px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.5;
        }

        /* Navigation Controls */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        button {
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            background: var(--white);
            color: var(--primary);
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s, background 0.2s;
        }

        button:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        #progress-text {
            font-weight: bold;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>Vokabeln</h1>
        
        <div class="flashcard-wrapper" onclick="toggleFlip()">
            <div class="flashcard" id="card">
                <div class="card-face card-front">
                    <p class="word" id="de-text">Wort</p>
                    <span class="hint">Deutsch (Klicken zum Umdrehen)</span>
                </div>
                <div class="card-face card-back">
                    <p class="word" id="en-text">Word</p>
                    <span class="hint">English</span>
                </div>
            </div>
        </div>

        <div class="controls">
            <button onclick="changeCard(-1)">Zurück</button>
            <span id="progress-text">1 / 5</span>
            <button onclick="changeCard(1)">Weiter</button>
        </div>
    </div>

    <script>
        /* --- JS: The Logic --- */
        const vocabulary = [
            { de: "Das Fernweh", en: "Wanderlust" },
            { de: "Die Zeitgeist", en: "Spirit of the times" },
            { de: "Gemütlichkeit", en: "Coziness / Comfort" },
            { de: "Vielleicht", en: "Maybe" },
            { de: "Kummerspeck", en: "Emotional overeating weight" }
        ];

        let currentIndex = 0;
        const card = document.getElementById('card');
        const deDisplay = document.getElementById('de-text');
        const enDisplay = document.getElementById('en-text');
        const progress = document.getElementById('progress-text');

        function updateUI() {
            // Un-flip the card before changing words
            card.classList.remove('flipped');
            
            // Short delay for the text update so it's hidden during the "reset"
            setTimeout(() => {
                deDisplay.textContent = vocabulary[currentIndex].de;
                enDisplay.textContent = vocabulary[currentIndex].en;
                progress.textContent = `${currentIndex + 1} / ${vocabulary.length}`;
            }, 150);
        }

        function toggleFlip() {
            card.classList.toggle('flipped');
        }

        function changeCard(direction) {
            currentIndex += direction;
            
            // Loop back logic
            if (currentIndex >= vocabulary.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = vocabulary.length - 1;
            
            updateUI();
        }

        // Add keyboard support (Space to flip, Arrows to move)
        document.addEventListener('keydown', (e) => {
            if (e.code === "Space") toggleFlip();
            if (e.code === "ArrowRight") changeCard(1);
            if (e.code === "ArrowLeft") changeCard(-1);
        });

        // Load first word
        updateUI();
    </script>
</body>
</html>
